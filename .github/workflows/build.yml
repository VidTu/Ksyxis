name: 'Build'
permissions: { }
on:
  push:
    branches: [ '!main' ]
  pull_request:
  workflow_dispatch:
jobs:
  build:
    name: 'Build'
    runs-on: 'ubuntu-24.04'
    timeout-minutes: 15
    permissions:
      contents: 'read'
    env:
      GRADLE_OPTS: '-Dorg.gradle.java.installations.auto-download=false'
    steps:
      - name: 'Checkout'
        timeout-minutes: 1
        uses: 'actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0' # v7.0.0
        with:
          persist-credentials: false
      - name: 'Setup JDK (8)'
        timeout-minutes: 1
        uses: 'actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287' # v5.3.0
        with:
          distribution: 'temurin'
          java-version: '8.0.492+9'
      - name: 'Setup JDK (25)'
        timeout-minutes: 1
        uses: 'actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287' # v5.3.0
        with:
          distribution: 'temurin'
          java-version: '25.0.3+9'
      - name: 'Setup Gradle'
        timeout-minutes: 5
        uses: 'gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92' # v6.2.0
        with:
          cache-read-only: true
          dependency-graph: 'generate'
      - name: 'Build'
        timeout-minutes: 15
        run: './gradlew assemble'
      - name: 'Upload Main JAR'
        timeout-minutes: 1
        uses: 'actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a' # v7.0.1
        with:
          path: 'build/libs/jar/*.jar'
          if-no-files-found: 'error'
          archive: false
      - name: 'Upload Javadoc JAR'
        timeout-minutes: 1
        uses: 'actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a' # v7.0.1
        with:
          path: 'build/libs/javadocJar/*.jar'
          if-no-files-found: 'error'
          archive: false
      - name: 'Upload Sources JAR'
        timeout-minutes: 1
        uses: 'actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a' # v7.0.1
        with:
          path: 'build/libs/sourcesJar/*.jar'
          if-no-files-found: 'error'
          archive: false
